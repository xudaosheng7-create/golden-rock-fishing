<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="rock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4912a"/>
      <stop offset="50%" stop-color="#a07020"/>
      <stop offset="100%" stop-color="#6b4c1a"/>
    </linearGradient>
    <linearGradient id="fishGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff9500"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006994"/>
      <stop offset="100%" stop-color="#003d5c"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="200" cy="200" r="190" fill="url(#sky)" stroke="#c4912a" stroke-width="3"/>

  <!-- 金色岩石 -->
  <path d="M120 280 L140 250 L160 260 L180 230 L200 245 L220 220 L240 235 L260 250 L280 270 L280 290 L120 290 Z" fill="url(#rock)" opacity="0.9"/>
  <path d="M160 260 L180 240 L200 255 L220 230 L240 245 L250 260" fill="#d4a540" opacity="0.3"/>

  <!-- 海水波纹 -->
  <path d="M80 290 Q120 280 160 290 Q200 300 240 290 Q280 280 320 290 L320 320 L80 320 Z" fill="url(#water)" opacity="0.7"/>
  <path d="M60 305 Q100 295 140 305 Q180 315 220 305 Q260 295 300 305 Q330 312 340 305 L340 325 L60 325 Z" fill="url(#water)" opacity="0.5"/>

  <!-- 跳跃的鱼 -->
  <g transform="translate(180, 130) rotate(-25)">
    <!-- 鱼身 -->
    <ellipse cx="0" cy="0" rx="55" ry="18" fill="url(#fishGrad)"/>
    <!-- 鱼尾 -->
    <path d="M-50 -5 L-75 -22 L-60 0 L-75 22 L-50 5 Z" fill="#ff6b35"/>
    <!-- 背鳍 -->
    <path d="M-20 -16 Q0 -35 25 -16 Z" fill="#ff5500" opacity="0.8"/>
    <!-- 腹鳍 -->
    <path d="M-10 14 Q5 30 15 14 Z" fill="#ff5500" opacity="0.6"/>
    <!-- 眼睛 -->
    <circle cx="35" cy="-4" r="5" fill="white"/>
    <circle cx="37" cy="-4" r="2.5" fill="#111"/>
    <!-- 鳃线 -->
    <path d="M20 -14 Q25 0 20 14" fill="none" stroke="#cc4400" stroke-width="1.5" opacity="0.5"/>
    <!-- 鳞片纹 -->
    <path d="M5 -6 Q10 0 5 6" fill="none" stroke="#e05520" stroke-width="0.8" opacity="0.4"/>
    <path d="M-5 -8 Q0 0 -5 8" fill="none" stroke="#e05520" stroke-width="0.8" opacity="0.4"/>
    <path d="M-15 -9 Q-10 0 -15 9" fill="none" stroke="#e05520" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- 水花 -->
  <g opacity="0.4">
    <circle cx="130" cy="270" r="3" fill="white"/>
    <circle cx="150" cy="265" r="2" fill="white"/>
    <circle cx="250" cy="275" r="2.5" fill="white"/>
    <circle cx="270" cy="268" r="2" fill="white"/>
  </g>

  <!-- 鱼线从左上入水 -->
  <path d="M60 60 Q140 100 140 280" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- 品牌名 -->
  <text x="200" y="365" text-anchor="middle" fill="#c4912a" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="30" font-weight="bold" letter-spacing="4">金岩石海钓</text>
  <text x="200" y="385" text-anchor="middle" fill="#8899aa" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="11" letter-spacing="6" opacity="0.7">GOLDEN ROCK FISHING</text>
</svg>
